version: '3.8'
services:
  backend:
    build: ./hrms-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - hrms-network

  frontend:
    build: ./hrms-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - hrms-network

networks:
  hrms-network:
    driver: bridge
